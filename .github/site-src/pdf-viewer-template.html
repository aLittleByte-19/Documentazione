<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{DOCUMENT_TITLE}} - Documentazione</title>
  <link rel="icon" type="image/png" href="{{ASSET_PREFIX}}assets/solo_logo.png">
  <link rel="stylesheet" href="{{ASSET_PREFIX}}pdf-viewer.css">
</head>
<body
  data-pdf-src="{{PDF_SRC}}"
  data-document-title="{{DOCUMENT_TITLE}}"
  data-site-root="{{ASSET_PREFIX}}"
>
  <header class="viewer-header">
    <div class="document-heading">
      <a class="brand" href="{{ASSET_PREFIX}}index.html" aria-label="Torna all'indice">
        <img src="{{ASSET_PREFIX}}assets/solo_logo.png" alt="">
        <span>aLittleByte</span>
      </a>
      <h1 id="document-title">{{DOCUMENT_TITLE}}</h1>
    </div>

    <nav class="toolbar" aria-label="Strumenti documento">
      <div class="zoom-controls" aria-label="Zoom documento">
        <button id="zoom-out" type="button" aria-label="Riduci zoom">-</button>
        <label class="zoom-input-label">
          <span class="sr-only">Zoom</span>
          <input id="zoom-input" type="text" value="100" inputmode="numeric" pattern="[0-9]*" aria-label="Zoom percentuale">
          <span aria-hidden="true">%</span>
        </label>
        <button id="zoom-in" type="button" aria-label="Aumenta zoom">+</button>
      </div>
      <a id="open-pdf-link" href="{{PDF_SRC}}" target="_blank" rel="noopener noreferrer">PDF</a>
      <a id="download-pdf-link" class="icon-button" href="{{PDF_SRC}}" download aria-label="Scarica PDF">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 3v12m0 0 5-5m-5 5-5-5M5 21h14"/>
        </svg>
        <span class="sr-only">Scarica</span>
      </a>
    </nav>
  </header>

  <button id="sidebar-toggle" class="sidebar-tab" type="button" aria-label="Mostra o nascondi anteprime" aria-pressed="true">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h13A1.5 1.5 0 0 1 20 5.5v13a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 18.5v-13Z"/>
      <path d="M9 4v16"/>
    </svg>
  </button>

  <div class="app-shell">
    <aside id="sidebar" class="sidebar" aria-label="Anteprime e ricerca">
      <section class="search-panel" aria-label="Ricerca nel testo">
        <div class="search-row">
          <div id="search-box" class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="m21 21-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z"/>
            </svg>
            <button id="search-clear" class="search-clear-button" type="button" aria-label="Cancella ricerca">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M6 6l12 12M18 6 6 18"/>
              </svg>
            </button>
            <label class="sr-only" for="search-input">Cerca</label>
            <input id="search-input" type="search" autocomplete="off" placeholder="Cerca">
          </div>
          <button id="search-prev" class="search-nav-button" type="button" aria-label="Risultato precedente">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="m6 15 6-6 6 6"/>
            </svg>
          </button>
          <button id="search-next" class="search-nav-button" type="button" aria-label="Risultato successivo">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="m6 9 6 6 6-6"/>
            </svg>
          </button>
        </div>
        <p id="search-status" class="search-status" aria-live="polite"></p>
      </section>

      <section class="thumbnail-panel" aria-label="Anteprime pagine">
        <div class="panel-heading">
          <h2>Anteprime</h2>
          <span id="page-count">0 pagine</span>
        </div>
        <div id="thumbnail-list" class="thumbnail-list"></div>
      </section>
    </aside>

    <main class="document-area">
      <div id="viewer-loader" class="viewer-loader" role="status" aria-live="polite">
        <div class="loader-card">
          <span>Caricamento documento</span>
          <div class="loader-track" aria-hidden="true">
            <span></span>
          </div>
        </div>
      </div>
      <p id="status" class="status" role="status" aria-live="polite">Caricamento documento...</p>
      <div id="viewer" class="viewer" role="region" aria-label="Documento PDF" tabindex="0"></div>
    </main>
  </div>

  <script type="module" src="{{ASSET_PREFIX}}pdf-viewer.js"></script>
</body>
</html>
