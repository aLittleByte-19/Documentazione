name: Autogenerazione Albero Documentazione

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!assets/**'
      - '!scripts/**'
      - '!website/**'
      - '!.github/**'
      - '!index.html'
      - '!prompt.tex'
      - 'scripts/update_index.py'
      - '.github/workflows/update-docs.yml'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Genera Albero HTML
        run: python scripts/update_index.py

      - name: Commit e Push dei cambiamenti
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: auto-generazione albero documentazione"
          
          git push